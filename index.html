<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landing Page</title>
    <script>
        function toggleFAQ(faqId) {
            const faq = document.getElementById(faqId);
            faq.classList.toggle('active');
        }

        function init() {
            const faqHeaders = document.querySelectorAll('.faq-header');
            faqHeaders.forEach(header => {
                header.addEventListener('click', () => {
                    toggleFAQ(header.dataset.faq);
                });
            });
        }

        window.onload = init;
    </script>
</head>
<body>
    <header>
        <h1>Welcome to Our Landing Page</h1>
    </header>
    <main>
        <section>
            <h2>Frequently Asked Questions</h2>
            <div class="faq">
                <div class="faq-header" data-faq="faq1">What is your return policy?</div>
                <div id="faq1" class="faq-content">You can return any item within 30 days.</div>
            </div>
            <div class="faq">
                <div class="faq-header" data-faq="faq2">Do you offer customer support?</div>
                <div id="faq2" class="faq-content">Yes, we offer customer support via email and chat.</div>
            </div>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Your Company.</p>
    </footer>
</body>
</html>
